<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenlight - Login</title>
    <link rel="stylesheet" href="./css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <div class="main-container">
        <section class="banner-side">
            <div class="banner-content">
                <h1> Além do véu, a sabedoria espera.</h1>
                <p class="legenda-verde">Conecte-se. Os enigmas do além encontram resposta aqui.</p>
            </div>
        </section>

        <section class="form-side">
            <div class="form-box">
                <h2>Bem-vindo de volta!</h2>
                <p class="subtitle">Acesse Vozes de Luanda e explore a imensidão da espiritualidade</p>

                <form>
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="input_email" placeholder="Seu @email.com">
                    </div>

                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="input_senha" placeholder="Sua senha">
                    </div>

                    <button type="button" class="btn-login" onclick="login()">Entrar</button>
                </form>

                <p class="signup-text">Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
            </div>
        </section>
    </div>

</body>

</html>
<script>
    function login() {
        let emailDigitado = input_email.value
        let senhaDigitada = input_senha.value
        let email = 'fernando.brandao@estufasverdes.com'
        let senha = 'Clara#PI04'


        if (senha == senhaDigitada && email == emailDigitado) {
            window.location.assign("./dashboard.html")
        } else {
            alert('Email/Senha inválido!')
        }
    }
</script>
