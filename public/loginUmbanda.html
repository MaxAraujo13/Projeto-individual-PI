<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenlight - Login</title>
    <link rel="stylesheet" href="./css/loginUmbanda.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <div class="main-container">
        <section class="banner-side">
            <div class="banner-content">
                <h1> Além do véu, a sabedoria espera.</h1>
                <p class="legenda-verde">Conecte-se. Os enigmas do além encontram resposta aqui.</p>
            </div>
        </section>

        <section class="form-side">
            <div class="form-box">
                <h2>Bem-vindo de volta!</h2>
                <p class="subtitle">Acesse Vozes de Luanda e explore a imensidão da espiritualidade</p>

                <form>
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="ipt_email" placeholder="Seu @email.com">
                    </div>

                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="ipt_senha" placeholder="Sua senha">
                    </div>

                    <button type="button" class="btn-login" onclick="fLogin()">Entrar</button>
                </form>

                <p class="signup-text">Não tem uma conta? <a href="usuario.html">Cadastre-se</a></p>
            </div>
        </section>
    </div>

</body>

</html>
<script>



    function fLogin() {

        let email = ipt_email.value;
        let senha = ipt_senha.value;

        if (email == "" || senha == "") {
            alert('Por favor, preencha todos os campos!');
            return;
        }

        let corpo = {
            emailServer: email,
            senhaServer: senha
        };

        fetch('/usuarios/autenticar', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(corpo)
        })
            .then(function (resposta) {
                if (resposta.status == 200) {
                    setTimeout(() => location.href = "tela-entidades.html", 700)

                } else {
                    alert('E-mail e/ou senha inválidos. Verifique seus dados e tente novamente.');
                }
            })
            .catch(function (erro) {
                console.log('Erro na chamada à API: ', erro);
                alert('Erro de conexão com o servidor.');
            });

    }



</script>
